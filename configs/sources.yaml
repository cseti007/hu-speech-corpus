    hours_estimated: 30-60
    estimated_size_gb: 5
    priority: 6
    path: raw/filmhiradok_1931_1943
    status: not_downloaded
    notes: |
      Archaic register, formal narration. Optional domain-bonus data.
      Audio extracted from video via ffmpeg.

