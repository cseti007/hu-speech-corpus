    description: YODAS Hungarian manual-caption subset (CMU/ESPnet, human YouTube captions)
    hf_repo: espnet/yodas
    hf_config: hu000
    license: CC-BY
    license_origin: YouTube CC-BY filter at scrape time
    hours: 181.76
    audio_format: FLAC 16 kHz mono
    estimated_size_gb: 15
    actual_size_gb: 35
    actual_utterance_count: 167705
    priority: 1
    path: raw/yodas_hu000
    status: deleted_2026_05_20
    notes: |
      Manual captions = human-uploaded YouTube subtitles, not ASR-generated.
      Higher quality anchor than MOSEL pseudo-labels.
      DELETED 2026-05-20: superseded by yodas2_hu000 (v2). v2 contains the
      same 1209 videos at video level + 70 more; utterance sets are
