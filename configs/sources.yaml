      24 tarballs (V1 + V2, years 2009-2020). 17,297 session ogg files in
      raw_audios/hu/<year>/<session_id>_hu.ogg. ~1 hour average per session.
      MOSEL transcripts reference these via session_id matching.
    notes: |
      Includes both labeled (63h transcribed) and unlabeled HU partition.
      Re-encode to Opus 32 kbps for ~6x space saving.

