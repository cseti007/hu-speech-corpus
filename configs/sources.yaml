    audio_format: variable (yt source)
    estimated_size_gb_flac: 800
    estimated_size_gb_opus32k: 180
    priority: 5
    path: raw/mosel_hu/youtubecommons_hu
    status: not_downloaded
    notes: |
      Largest single chunk. Recommend direct Opus 32 kbps mono extraction
      via yt-dlp to skip FLAC intermediate.

  parliament_hu_gray:
    description: |
      Hungarian Parliament (Orszaggyules) session recordings — GRAY ZONE license status.
      Speech CONTENT is per Szjt. 1.§ (4) "hivatalos kozlemeny" → not copyright protected,
      BUT recordings have a 50-year producer's related right (Szjt. 73.§). No explicit
      CC license granted by parlament.hu. User decision: include as secondary source
      with full awareness of legal ambiguity. Practical risk: low (no enforcement
      precedent for ML training use). Stored in a dedicated dir to keep separable.
    source_url: http://plenaris.parlament.hu:1935/edgelive/smil:mkogyplen.smil/playlist.m3u8
    archive_url: https://www.parlament.hu/videoarchivum
    license: GRAY_ZONE (content PD via Szjt 1.§(4), recording protected by 50-yr neighboring right)
    hours_estimated: "varies, ~100-200h per session year"
    audio_format: HLS stream, extract audio via ffmpeg
    estimated_size_gb_per_year: 20-50
    priority: 8 (last; secondary source after free-license sources exhausted)
    path: raw/parliament_hu_gray
    status: not_downloaded
    tooling: |
      - HLS m3u8 endpoint above (live + archive)
      - Existing tool: https://github.com/fodi/parlament-dl
      - Audio extraction: ffmpeg -i <ts segments> -vn -acodec copy out.aac
    notes: |
      ALTERNATIVE: VoxPopuli HU (CC0) already covers EU Parliament Hungarian interpretations
      with 63h labeled + ~4400h unlabeled. That covers most parliament-style register cleanly.
      Only download national Parliament HU recordings if VoxPopuli register is insufficient.

  filmhiradok_1931_1943:
    description: Hungarian World Newsreel archive (Magyar Vilaghirado)
    source_url: https://filmhiradokonline.hu/
