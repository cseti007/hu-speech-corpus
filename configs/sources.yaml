    source_url: https://dl.fbaipublicfiles.com/voxpopuli/audios/hu_<year>[_2].tar
    license: CC0
    hours: 18200  # estimated from 17,297 sessions × ~1h avg
    session_count: 17297
    audio_format: Ogg Vorbis 16 kHz mono ~32 kbps
    actual_size_gb: 297
    priority: 5
    path: raw/voxpopuli_hu_unlabeled
    status: downloaded
